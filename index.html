<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>The Breakfast Club POS</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="bg-overlay"></div>

    <h1>The Breakfast Club POS</h1>

    <div class="layout">
      <!-- LEFT: ITEM CARDS -->
      <div class="menu-grid">
        <!-- Coffee -->
        <div
          class="item-card"
          onmouseenter="setPageBackground('https://colombiancoffee.us/cdn/shop/articles/tips-to-recognize-good-quality-coffee-424970.png')"
          onmouseleave="clearPageBackground()"
        >
          <div class="item-card-inner">
            <img
              src="https://colombiancoffee.us/cdn/shop/articles/tips-to-recognize-good-quality-coffee-424970.png"
              alt="Coffee"
            />
            <h3>Coffee</h3>
            <p>$700 GYD</p>
            <div class="cart-controls">
              <button class="qty-btn" onclick="changeQty('Coffee', 700, -1)">
                −
              </button>
              <span id="qty-Coffee">0</span>
              <button class="qty-btn" onclick="changeQty('Coffee', 700, 1)">
                +
              </button>
            </div>
            <button class="add-btn" onclick="addToCart('Coffee', 700)">
              Add to Cart
            </button>
          </div>
        </div>

        <!-- Tea -->
        <div
          class="item-card"
          onmouseenter="setPageBackground('https://www.kimbertonwholefoods.com/wp-content/uploads/2020/02/tea-2.jpg')"
          onmouseleave="clearPageBackground()"
        >
          <div class="item-card-inner">
            <img
              src="https://www.kimbertonwholefoods.com/wp-content/uploads/2020/02/tea-2.jpg"
              alt="Tea"
            />
            <h3>Tea</h3>
            <p>$500 GYD</p>
            <div class="cart-controls">
              <button class="qty-btn" onclick="changeQty('Tea', 500, -1)">
                −
              </button>
              <span id="qty-Tea">0</span>
              <button class="qty-btn" onclick="changeQty('Tea', 500, 1)">
                +
              </button>
            </div>
            <button class="add-btn" onclick="addToCart('Tea', 500)">
              Add to Cart
            </button>
          </div>
        </div>

        <!-- Pancakes -->
        <div
          class="item-card"
          onmouseenter="setPageBackground('https://hips.hearstapps.com/hmg-prod/images/best-homemade-pancakes-index-640775a2dbad8.jpg')"
          onmouseleave="clearPageBackground()"
        >
          <div class="item-card-inner">
            <img
              src="https://hips.hearstapps.com/hmg-prod/images/best-homemade-pancakes-index-640775a2dbad8.jpg"
              alt="Pancakes"
            />
            <h3>Pancakes</h3>
            <p>$1,500 GYD</p>
            <div class="cart-controls">
              <button class="qty-btn" onclick="changeQty('Pancakes', 1500, -1)">
                −
              </button>
              <span id="qty-Pancakes">0</span>
              <button class="qty-btn" onclick="changeQty('Pancakes', 1500, 1)">
                +
              </button>
            </div>
            <button class="add-btn" onclick="addToCart('Pancakes', 1500)">
              Add to Cart
            </button>
          </div>
        </div>

        <!-- Muffin -->
        <div
          class="item-card"
          onmouseenter="setPageBackground('https://www.simplyrecipes.com/thmb/JeV8ucxWAKIsxEYe1GtsgSGLRO0=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/Simply-Recipes-Aunt-Cindy-Blueberry-Muffins-LEAD-1-e2684805dd6e4c98b11df87d659c7ea7.jpg')"
          onmouseleave="clearPageBackground()"
        >
          <div class="item-card-inner">
            <img
              src="https://www.simplyrecipes.com/thmb/JeV8ucxWAKIsxEYe1GtsgSGLRO0=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/Simply-Recipes-Aunt-Cindy-Blueberry-Muffins-LEAD-1-e2684805dd6e4c98b11df87d659c7ea7.jpg"
              alt="Muffin"
            />
            <h3>Muffin</h3>
            <p>$800 GYD</p>
            <div class="cart-controls">
              <button class="qty-btn" onclick="changeQty('Muffin', 800, -1)">
                −
              </button>
              <span id="qty-Muffin">0</span>
              <button class="qty-btn" onclick="changeQty('Muffin', 800, 1)">
                +
              </button>
            </div>
            <button class="add-btn" onclick="addToCart('Muffin', 800)">
              Add to Cart
            </button>
          </div>
        </div>

        <!-- Sandwich -->
        <div
          class="item-card"
          onmouseenter="setPageBackground('https://www.allrecipes.com/thmb/H_gwkwI6-5YPvZhXxYyf2TS5vbs=/0x512/filters:no_upscale():max_bytes(150000):strip_icc()/AR-238891-Grilled-Cheese-Sandwich-beauty-4x3-362f705972e64a948b7ec547f7b2a831.jpg')"
          onmouseleave="clearPageBackground()"
        >
          <div class="item-card-inner">
            <img
              src="https://www.allrecipes.com/thmb/H_gwkwI6-5YPvZhXxYyf2TS5vbs=/0x512/filters:no_upscale():max_bytes(150000):strip_icc()/AR-238891-Grilled-Cheese-Sandwich-beauty-4x3-362f705972e64a948b7ec547f7b2a831.jpg"
              alt="Sandwich"
            />
            <h3>Sandwich</h3>
            <p>$1,300 GYD</p>
            <div class="cart-controls">
              <button class="qty-btn" onclick="changeQty('Sandwich', 1300, -1)">
                −
              </button>
              <span id="qty-Sandwich">0</span>
              <button class="qty-btn" onclick="changeQty('Sandwich', 1300, 1)">
                +
              </button>
            </div>
            <button class="add-btn" onclick="addToCart('Sandwich', 1300)">
              Add to Cart
            </button>
          </div>
        </div>

        <!-- Eggs -->
        <div
          class="item-card"
          onmouseenter="setPageBackground('https://southernbite.com/wp-content/uploads/2021/05/Perfect-Scrambled-Eggs-2.jpg')"
          onmouseleave="clearPageBackground()"
        >
          <div class="item-card-inner">
            <img
              src="https://southernbite.com/wp-content/uploads/2021/05/Perfect-Scrambled-Eggs-2.jpg"
              alt="Eggs"
            />
            <h3>Eggs</h3>
            <p>$ 600 GYD</p>
            <div class="cart-controls">
              <button class="qty-btn" onclick="changeQty('Eggs', 600, -1)">
                −
              </button>
              <span id="qty-Eggs">0</span>
              <button class="qty-btn" onclick="changeQty('Eggs', 600, 1)">
                +
              </button>
            </div>
            <button class="add-btn" onclick="addToCart('Eggs', 600)">
              Add to Cart
            </button>
          </div>
        </div>
      </div>

      <!-- RIGHT: CHECKOUT CART -->
      <div class="pos-container">
        <h2 class="checkout-title">Checkout</h2>

        <table class="cart-table">
          <thead>
            <tr>
              <th>Item</th>
              <th>Unit Price</th>
              <th>Qty</th>
              <th>Total</th>
              <th>Adjust</th>
            </tr>
          </thead>
          <tbody id="cart-body">
            <!-- rows injected by JS -->
          </tbody>
        </table>

        <div class="grand-total-row">
          <span>Grand Total (GYD):</span>
          <span id="grand-total">0.00</span>
        </div>

        <button id="submitBtn" onclick="submitOrder()">Submit Order</button>

        <div id="status"></div>
      </div>
    </div>

    <script src="script.js"></script>
    <audio src="snoozybeats-shoppingsplash.mp3" autoplay loop>
      Your browser does not support the audio element.
    </audio>
  </body>
</html>
