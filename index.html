<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TPS POS Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Transactional Processing System - POS</h1>

  <div class="pos-container">
    <div class="field">
      <label for="itemSelect">Item:</label>
      <select id="itemSelect" onchange="updatePrice()">
        <option value="">-- Select Item --</option>
        <option value="A001" data-price="1,200">A001 - Coffee</option>
        <option value="A002" data-price="500">A002 - Muffin</option>
        <option value="A003" data-price="1,000">A003 - Sandwich</option>
        <option value="A004" data-price="600">A004 - Pancakes</option>
        <option value="A005" data-price="1,200">A005 - Tea</option>  
      </select>
    </div>

    <div class="field">
      <label for="unitPrice">Unit Price:</label>
      <input id="unitPrice" type="text" readonly>
    </div>

    <div class="field">
      <label for="quantity">Quantity:</label>
      <input id="quantity" type="number" min="1" value="1" onchange="updateTotal()">
    </div>

    <div class="field">
      <label for="total">Total:</label>
      <input id="total" type="text" readonly>
    </div>

    <button id="submitBtn" onclick="submitTransaction()">Submit Transaction</button>

    <div id="status"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
